<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>가치줄기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Spoqa+Han+Sans+Neo:wght@400;500;700&display=swap">
<style>
html,body,div,span,applet,object,iframe,h1,h2,h3,h4,h5,h6,p,blockquote,pre,a,abbr,acronym,address,big,cite,code,del,dfn,em,img,ins,kbd,q,s,samp,small,strike,strong,sub,sup,tt,var,b,u,i,center,dl,dt,dd,ol,ul,li,fieldset,form,label,legend,table,caption,tbody,tfoot,thead,tr,th,td,article,aside,canvas,details,embed,figure,figcaption,footer,header,hgroup,menu,nav,output,ruby,section,summary,time,mark,audio,video{margin:0;padding:0;border:0;font-size:100%;font:inherit;vertical-align:baseline;}
article,aside,details,figcaption,figure,footer,header,hgroup,menu,nav,section{display:block;}
body{line-height:1;}
ol,ul{list-style:none;}
blockquote,q{quotes:none;}
blockquote:before,blockquote:after,q:before,q:after{content:'';content:none;}
table{border-collapse:collapse;border-spacing:0;}

*{font-family:'Spoqa Han Sans Neo',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-size:0;max-width:100%;background:#FEEBFA;overflow:hidden;}
ul,li{list-style:none;padding:0;margin:0;}
a{text-decoration:none;color:inherit;font-size:inherit;display:inline-block;cursor:pointer;line-height:inherit;}

.bg_01{background:#FEEBFA;}

.wrap{width:100%;max-width:720px;margin:0 auto;padding-bottom:20px;}
.wrap.wrap2{padding-bottom:0;}

.header{width:100%;height:70px;padding:20px;position:fixed;top:0;left:0;color:#3042CD;background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/logo-splash.png) no-repeat right bottom #FEEBFA;background-size:123px auto;}

.body{width:100%;padding:0 20px;position:relative;}
.body2{width:100%;height:calc(100vh + 20px);padding:0 20px;background:#FEEBFA;}
.body.body3{padding:0px;height:calc(95vh);}

.tap_bar{width:100%;height:85px;background:#fff;font-size:12px;border-radius:20px 20px 0 0;position:fixed;left:0;bottom:0;text-align:center;padding:20px 10px;z-index:1000;}
.tap_bar li{width:19%;display:inline-block;}
.tap_bar li a{width:100%;}
.tap_bar li .logo{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/logo_tab.png) no-repeat center;background-size:auto 100%;width:100%;height:45px;}
.tap_bar li .icon{width:100%;height:24px;}
.tap_bar li .icon.v01{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-01.png) no-repeat center;background-size:24px 24px;}
.tap_bar li .icon.v02{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-02.png) no-repeat center;background-size:24px 24px;}
.tap_bar li .icon.v03{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-03.png) no-repeat center;background-size:24px 24px;}
.tap_bar li .icon.v04{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-04.png) no-repeat center;background-size:24px 24px;}
.tap_bar li .label{width:100%;height:40px;margin-top:10px;color:#453B42;font-size:12px;}
.tap_bar li.on .icon.v01{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-01-ac.png) no-repeat center;background-size:24px 24px;}
.tap_bar li.on .icon.v02{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-02-ac.png) no-repeat center;background-size:24px 24px;}
.tap_bar li.on .icon.v03{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-03-ac.png) no-repeat center;background-size:24px 24px;}
.tap_bar li.on .icon.v04{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/tab-04-ac.png) no-repeat center;background-size:24px 24px;}
.tap_bar li.on .label{color:#FF2BB9;}

.side_bar{width:40px;position:fixed;right:10px;bottom:150px;box-shadow:0 5px 10px 0 rgba(34,43,69,0.15);z-index:10;}
.side_bar div{width:40px;height:40px;border-bottom:1px solid #f0f0f0;}
.side_bar div.tab{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/btn_side_02.png) no-repeat center;background-size:100%;border-radius:10px 10px 0 0;}
.side_bar div.tab2{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/btn_side_03.png) no-repeat center;background-size:100%;}
.side_bar div.tab3{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/btn_side_04.png) no-repeat center;background-size:100%;border-bottom:0;}
.side_bar div.tab4{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/btn_side_02ac.png) no-repeat center;background-size:100%;border-radius:10px 10px 0 0;}
.side_bar div.tab5{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/btn_side_03ac.png) no-repeat center;background-size:100%;border-bottom:0;}
.side_bar div.tab6{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/btn_side_04ac.png) no-repeat center;background-size:100%;border-bottom:0;}

.splash{width:100%;max-width:720px;height:100vh;margin:0 auto;background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/logo-splash.png) no-repeat center;background-size:50%;background-color:#FEEBFA;}

.header.header2{background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/logo-01.png) no-repeat #fff;background-position:50% 20px;position:fixed;background-size:110px auto;top:0;left:0;z-index:10;}
.header.header2 .back{width:42px;height:42px;border-bottom:1px solid #fff;background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/icon-back-1.png) center no-repeat;background-size:42px;position:absolute;top:12px;left:5px;}

.map2{width:100%;height:100%;position:relative;}
.map2 .gradi{width:100%;height:100%;opacity:0.2;background-blend-mode:overlay;background-image:linear-gradient(179deg,#3042CD 24%,#FF2BB9 104%);position:absolute;top:0;left:0;}
.map2 .mak{width:45px;height:56px;background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/icon-mk.png) no-repeat center;background-size:45px 56px;position:absolute;top:30%;right:20%;}
.map2 .mak2{width:45px;height:56px;background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/icon-mk2.png) no-repeat center;background-size:45px 56px;position:absolute;top:50%;right:70%;}
.map2 .mak3{width:45px;height:56px;background:url(https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/icon-mk3.png) no-repeat center top;background-size:45px 56px;position:absolute;top:40%;right:80%;}

.img_area{width:100%;padding-bottom:70px;overflow-y:auto;}
.img_area img{width:100%;display:block;}

/* 뷰 전환 */
#view-splash{display:block;}
#view-map{display:none;}
#view-community{display:none;}
#view-campaign{display:none;}

/* 카카오 지도 컨테이너 */
#kakao-map{width:100%;height:100%;display:none;}
</style>
</head>
<body>

<!-- ===== SPLASH ===== -->
<div id="view-splash">
  <div class="splash"></div>
</div>

<!-- ===== MAP VIEW ===== -->
<div id="view-map">
  <div class="wrap wrap2">
    <div class="header header2">
      <span class="back"></span>
    </div>
    <div class="body body3">
      <div class="map2" id="map">
        <!-- 카카오 지도 -->
        <div id="kakao-map"></div>
        <!-- 폴백: 그라디언트 + 이미지 마커 -->
        <div class="gradi" id="map-fallback-gradi"></div>
        <div class="mak" id="map-fallback-mak1"></div>
        <div class="mak2" id="map-fallback-mak2"></div>
        <div class="mak3" id="map-fallback-mak3"></div>
        <!-- 사이드바 -->
        <div class="side_bar" id="side_bar">
          <!-- page_03(기본): tab4 / tab2 / tab3 -->
          <div id="sb-btn1" class="tab4" onclick="setSideBar(0)"></div>
          <div id="sb-btn2" class="tab2" onclick="setSideBar(1)"></div>
          <div id="sb-btn3" class="tab3" onclick="setSideBar(2)"></div>
        </div>
      </div>
    </div>
    <ul class="tap_bar" id="tap-map">
      <li onclick="switchTab('map')" class="on" id="nav-map">
        <a><span class="icon v01"></span><span class="label">지도</span></a>
      </li>
      <li onclick="switchTab('community')" id="nav-community">
        <a><span class="icon v02"></span><span class="label">커뮤니티</span></a>
      </li>
      <li>
        <a><span class="logo"></span></a>
      </li>
      <li onclick="switchTab('campaign')" id="nav-campaign">
        <a><span class="icon v03"></span><span class="label">캠페인</span></a>
      </li>
      <li onclick="switchTab('profile')" id="nav-profile">
        <a><span class="icon v04"></span><span class="label">프로필</span></a>
      </li>
    </ul>
  </div>
</div>

<!-- ===== COMMUNITY VIEW ===== -->
<div id="view-community">
  <div class="wrap wrap2 bg_01">
    <div class="header header2">
      <span class="back" onclick="switchTab('map')"></span>
    </div>
    <div class="body body3">
      <div class="img_area">
        <img src="https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/img_01.png" alt="커뮤니티">
      </div>
    </div>
    <ul class="tap_bar" id="tap-community">
      <li onclick="switchTab('map')" id="nav-map-c">
        <a><span class="icon v01"></span><span class="label">지도</span></a>
      </li>
      <li onclick="switchTab('community')" class="on" id="nav-community-c">
        <a><span class="icon v02"></span><span class="label">커뮤니티</span></a>
      </li>
      <li>
        <a><span class="logo"></span></a>
      </li>
      <li onclick="switchTab('campaign')" id="nav-campaign-c">
        <a><span class="icon v03"></span><span class="label">캠페인</span></a>
      </li>
      <li onclick="switchTab('profile')" id="nav-profile-c">
        <a><span class="icon v04"></span><span class="label">프로필</span></a>
      </li>
    </ul>
  </div>
</div>

<!-- ===== CAMPAIGN VIEW ===== -->
<div id="view-campaign">
  <div class="wrap wrap2 bg_01">
    <div class="header header2">
      <span class="back" onclick="switchTab('map')"></span>
    </div>
    <div class="body body3">
      <div class="img_area">
        <img src="https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/img_02.png" alt="캠페인">
      </div>
    </div>
    <ul class="tap_bar" id="tap-campaign">
      <li onclick="switchTab('map')" id="nav-map-p">
        <a><span class="icon v01"></span><span class="label">지도</span></a>
      </li>
      <li onclick="switchTab('community')" id="nav-community-p">
        <a><span class="icon v02"></span><span class="label">커뮤니티</span></a>
      </li>
      <li>
        <a><span class="logo"></span></a>
      </li>
      <li onclick="switchTab('campaign')" class="on" id="nav-campaign-p">
        <a><span class="icon v03"></span><span class="label">캠페인</span></a>
      </li>
      <li onclick="switchTab('profile')" id="nav-profile-p">
        <a><span class="icon v04"></span><span class="label">프로필</span></a>
      </li>
    </ul>
  </div>
</div>

<script>
var kakaoLoaded = false;
var mapInitialized = false;
var sideBarState = 0; // 0: page_03, 1: page_04, 2: page_05

// ── 스플래시 3초 후 지도 뷰로 전환 ──
setTimeout(function() {
  document.getElementById('view-splash').style.display = 'none';
  document.getElementById('view-map').style.display = 'block';
  initKakaoMap();
}, 3000);

// ── 탭 전환 ──
function switchTab(tab) {
  document.getElementById('view-map').style.display = 'none';
  document.getElementById('view-community').style.display = 'none';
  document.getElementById('view-campaign').style.display = 'none';

  if (tab === 'map') {
    document.getElementById('view-map').style.display = 'block';
    if (!mapInitialized) initKakaoMap();
  } else if (tab === 'community') {
    document.getElementById('view-community').style.display = 'block';
  } else if (tab === 'campaign') {
    document.getElementById('view-campaign').style.display = 'block';
  } else if (tab === 'profile') {
    alert('준비중입니다.');
    // 현재 탭 유지 – 지도로 복귀
    document.getElementById('view-map').style.display = 'block';
  }
}

// ── 사이드바 상태 ──
// state 0 → page_03: btn1=tab4, btn2=tab2, btn3=tab3
// state 1 → page_04: btn1=tab,  btn2=tab2, btn3=tab6
// state 2 → page_05: btn1=tab,  btn2=tab5, btn3=tab3
function setSideBar(state) {
  sideBarState = state;
  var btn1 = document.getElementById('sb-btn1');
  var btn2 = document.getElementById('sb-btn2');
  var btn3 = document.getElementById('sb-btn3');

  // 공통 스타일 초기화 (border-radius, border-bottom은 class로 제어)
  btn1.className = '';
  btn2.className = '';
  btn3.className = '';

  if (state === 0) {
    btn1.className = 'tab4';
    btn2.className = 'tab2';
    btn3.className = 'tab3';
  } else if (state === 1) {
    btn1.className = 'tab';
    btn2.className = 'tab2';
    btn3.className = 'tab6';
  } else if (state === 2) {
    btn1.className = 'tab';
    btn2.className = 'tab5';
    btn3.className = 'tab3';
  }
}

// ── Kakao Maps 초기화 ──
function initKakaoMap() {
  if (mapInitialized) return;

  var script = document.createElement('script');
  script.type = 'text/javascript';
  script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=5715011e564f34008898ac0b2c497e94';

  script.onload = function() {
    try {
      kakao.maps.load(function() {
        var container = document.getElementById('kakao-map');
        var options = {
          center: new kakao.maps.LatLng(37.5665, 126.9780),
          level: 3
        };
        var map = new kakao.maps.Map(container, options);

        // 커스텀 마커 3개
        var markerData = [
          { lat: 37.5685, lng: 126.9800, img: 'icon-mk.png',  w: 45, h: 56 },
          { lat: 37.5650, lng: 126.9720, img: 'icon-mk2.png', w: 45, h: 56 },
          { lat: 37.5630, lng: 126.9850, img: 'icon-mk3.png', w: 45, h: 56 }
        ];
        var imgBase = 'https://raw.githubusercontent.com/sihnrila/together/master/src/assets/img/';

        markerData.forEach(function(d) {
          var imgSrc = imgBase + d.img;
          var imgSize = new kakao.maps.Size(d.w, d.h);
          var markerImage = new kakao.maps.MarkerImage(imgSrc, imgSize);
          new kakao.maps.Marker({
            map: map,
            position: new kakao.maps.LatLng(d.lat, d.lng),
            image: markerImage
          });
        });

        // 지도 로드 성공 → 카카오 지도 표시, 폴백 숨김
        container.style.display = 'block';
        document.getElementById('map-fallback-gradi').style.display = 'none';
        document.getElementById('map-fallback-mak1').style.display = 'none';
        document.getElementById('map-fallback-mak2').style.display = 'none';
        document.getElementById('map-fallback-mak3').style.display = 'none';

        mapInitialized = true;
        kakaoLoaded = true;
      });
    } catch(e) {
      showFallback();
    }
  };

  script.onerror = function() {
    showFallback();
  };

  document.head.appendChild(script);
}

function showFallback() {
  document.getElementById('kakao-map').style.display = 'none';
  document.getElementById('map-fallback-gradi').style.display = 'block';
  document.getElementById('map-fallback-mak1').style.display = 'block';
  document.getElementById('map-fallback-mak2').style.display = 'block';
  document.getElementById('map-fallback-mak3').style.display = 'block';
}
</script>
</body>
</html>
